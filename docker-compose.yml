version: "3.9"

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       datamyna
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10

  backend:
    build:    ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/datamyna
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./tracker:/app/tracker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:   ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
